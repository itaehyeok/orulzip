services:
  worker:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${ORULZIP_DB_INIT:-1}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${WORKER_IDLE_DELAY_MS:-5000}
      WORKER_REGION_IDS: ${WORKER_REGION_IDS:-seoul}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  worker-gyeonggi:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker-gyeonggi
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${ORULZIP_DB_INIT:-1}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${WORKER_IDLE_DELAY_MS:-5000}
      WORKER_REGION_IDS: ${WORKER_GYEONGGI_REGION_IDS:-gyeonggi}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  worker-kb-national-1:
    build: .
    profiles: ["kb-national"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker-kb-national-1
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${KB_NATIONAL_WORKER_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${KB_NATIONAL_WORKER_IDLE_DELAY_MS:-1000}
      WORKER_REGION_IDS: ${KB_NATIONAL_WORKER_1_REGION_IDS:-seoul,incheon,gyeonggi}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  worker-kb-national-2:
    build: .
    profiles: ["kb-national"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker-kb-national-2
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${KB_NATIONAL_WORKER_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${KB_NATIONAL_WORKER_IDLE_DELAY_MS:-1000}
      WORKER_REGION_IDS: ${KB_NATIONAL_WORKER_2_REGION_IDS:-busan,ulsan,gyeongnam,jeju}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  worker-kb-national-3:
    build: .
    profiles: ["kb-national"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker-kb-national-3
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${KB_NATIONAL_WORKER_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${KB_NATIONAL_WORKER_IDLE_DELAY_MS:-1000}
      WORKER_REGION_IDS: ${KB_NATIONAL_WORKER_3_REGION_IDS:-daegu,gyeongbuk,gangwon,chungbuk}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  worker-kb-national-4:
    build: .
    profiles: ["kb-national"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-worker-kb-national-4
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${KB_NATIONAL_WORKER_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      WORKER_IDLE_DELAY_MS: ${KB_NATIONAL_WORKER_IDLE_DELAY_MS:-1000}
      WORKER_REGION_IDS: ${KB_NATIONAL_WORKER_4_REGION_IDS:-daejeon,sejong,chungnam,jeonbuk,jeonnam,gwangju}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
    networks:
      - orulzip-shared

  price-band-cache:
    build: .
    profiles: ["loop"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-price-band-cache
    restart: unless-stopped
    command: ["npm", "run", "refresh:price-band-cache:loop"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_DB_INIT: ${PRICE_BAND_CACHE_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      PRICE_BAND_CACHE_REFRESH_INTERVAL_MS: ${PRICE_BAND_CACHE_REFRESH_INTERVAL_MS:-86400000}
    networks:
      - orulzip-shared

  performance-measurements:
    build: .
    profiles: ["loop"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-performance-measurements
    restart: unless-stopped
    command: ["npm", "run", "check:performance:loop"]
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_ENVIRONMENT: ${ORULZIP_ENVIRONMENT:-production}
      ORULZIP_DB_INIT: ${PERFORMANCE_MEASUREMENT_DB_INIT:-0}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      PERFORMANCE_MEASUREMENT_INTERVAL_MS: ${PERFORMANCE_MEASUREMENT_INTERVAL_MS:-600000}
    networks:
      - orulzip-shared

  molit-daily-collector:
    build: .
    profiles: ["loop"]
    container_name: ${CONTAINER_PREFIX:-orulzip-data-collector}-molit-daily-collector
    restart: unless-stopped
    command:
      - sh
      - -c
      - >
        while true; do
          npm run daily:molit;
          sleep ${MOLIT_DAILY_INTERVAL_SECONDS:-86400};
        done
    environment:
      DATABASE_URL: ${DATA_COLLECTOR_DATABASE_URL:-${DATABASE_URL:?set DATABASE_URL}}
      ORULZIP_ENVIRONMENT: ${ORULZIP_ENVIRONMENT:-production}
      ORULZIP_DB_INIT: ${ORULZIP_DB_INIT:-1}
      ORULZIP_READ_ONLY: ${ORULZIP_READ_ONLY:-0}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
      NAVER_MAP_NCP_KEY_ID: ${NAVER_MAP_NCP_KEY_ID:-}
      NAVER_MAP_NCP_KEY_SECRET: ${NAVER_MAP_NCP_KEY_SECRET:-}
      MOLIT_GEOCODE_LIMIT: ${MOLIT_GEOCODE_LIMIT:-5000}
      MOLIT_DAILY_TARGETS: ${MOLIT_DAILY_TARGETS:-all-sido}
      MOLIT_DAILY_RECENT_TARGETS: ${MOLIT_DAILY_RECENT_TARGETS:-all-sido}
      MOLIT_DAILY_LIMIT: ${MOLIT_DAILY_LIMIT:-6500}
      MOLIT_DAILY_DELAY_MS: ${MOLIT_DAILY_DELAY_MS:-500}
      MOLIT_DAILY_BACKFILL: ${MOLIT_DAILY_BACKFILL:-1}
      MOLIT_DAILY_REFRESH_PRICE_BAND_CACHE: ${MOLIT_DAILY_REFRESH_PRICE_BAND_CACHE:-1}
      ORULZIP_TELEGRAM_BOT_TOKEN: ${ORULZIP_TELEGRAM_BOT_TOKEN:-}
      ORULZIP_TELEGRAM_CHAT_ID: ${ORULZIP_TELEGRAM_CHAT_ID:-}
      ORULZIP_TELEGRAM_DATA_HEALTH_ENVIRONMENTS: ${ORULZIP_TELEGRAM_DATA_HEALTH_ENVIRONMENTS:-production}
    networks:
      - orulzip-shared

networks:
  orulzip-shared:
    name: ${ORULZIP_DOCKER_NETWORK:-orulzip-shared}
    external: true
