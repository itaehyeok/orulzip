name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production folder
    runs-on: [self-hosted, linux, orulzip-production]
    timeout-minutes: 30

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Deploy production
        env:
          DEPLOY_DIR: /home/th/docker/custom/orulzip/production
          DEPLOY_BRANCH: main
          COMPOSE_PROJECT_NAME: orulzip
          COMPOSE_FILE: docker-compose.web.yml
          DOCKER_NETWORK_NAME: orulzip-shared
          HEALTHCHECK_URL: http://localhost:3050/map
          DEPLOY_ENVIRONMENT: production
          DEPLOY_PERFORMANCE_GATE: "1"
          PERFORMANCE_MEASUREMENT_WARN_MS: "1000"
          PERFORMANCE_MEASUREMENT_FAIL_MS: "2000"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-production.sh
