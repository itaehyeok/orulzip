services:
  postgres:
    image: postgres:16
    container_name: ${CONTAINER_PREFIX:-orulzip}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orulzip
      POSTGRES_USER: orulzip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orulzip_change_me}
    volumes:
      - ${POSTGRES_DATA_DIR:-/mnt/elements10tb/orulzip/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orulzip -d orulzip"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        ORULZIP_COMMIT_SHA: ${ORULZIP_COMMIT_SHA:-unknown}
        ORULZIP_DEPLOYED_AT_KST: ${ORULZIP_DEPLOYED_AT_KST:-local}
        ORULZIP_RECENT_COMMITS_JSON: '${ORULZIP_RECENT_COMMITS_JSON:-[]}'
    container_name: ${CONTAINER_PREFIX:-orulzip}-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3050
      ORULZIP_COMMIT_SHA: ${ORULZIP_COMMIT_SHA:-unknown}
      ORULZIP_DEPLOYED_AT_KST: ${ORULZIP_DEPLOYED_AT_KST:-local}
      ORULZIP_RECENT_COMMITS_JSON: '${ORULZIP_RECENT_COMMITS_JSON:-[]}'
      DATABASE_URL: postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip
      ANALYTICS_DATABASE_URL: ${ANALYTICS_DATABASE_URL:-postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip}
      NAVER_MAP_NCP_KEY_ID: ${NAVER_MAP_NCP_KEY_ID:-}
      NAVER_MAP_NCP_KEY_SECRET: ${NAVER_MAP_NCP_KEY_SECRET:-}
      NAVER_MAP_DISABLED: ${NAVER_MAP_DISABLED:-}
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
      ORULZIP_ADMIN_USER: ${ORULZIP_ADMIN_USER:-}
      ORULZIP_ADMIN_PASSWORD: ${ORULZIP_ADMIN_PASSWORD:-}
      ORULZIP_ADMIN_SESSION_SECRET: ${ORULZIP_ADMIN_SESSION_SECRET:-}
      ORULZIP_ADMIN_COOKIE_SECURE: ${ORULZIP_ADMIN_COOKIE_SECURE:-0}
      ORULZIP_TELEGRAM_BOT_TOKEN: ${ORULZIP_TELEGRAM_BOT_TOKEN:-}
      ORULZIP_TELEGRAM_CHAT_ID: ${ORULZIP_TELEGRAM_CHAT_ID:-}
      ORULZIP_TELEGRAM_VISITOR_ALERT_ENVIRONMENTS: ${ORULZIP_TELEGRAM_VISITOR_ALERT_ENVIRONMENTS:-production}
    ports:
      - "${WEB_PORT:-3050}:3050"

  worker:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip}-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip
      WORKER_IDLE_DELAY_MS: 5000
      WORKER_REGION_IDS: seoul
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}

  worker-gyeonggi:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip}-worker-gyeonggi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip
      WORKER_IDLE_DELAY_MS: 5000
      WORKER_REGION_IDS: gyeonggi
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}

  price-band-cache:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip}-price-band-cache
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "refresh:price-band-cache:loop"]
    environment:
      DATABASE_URL: postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip
      PRICE_BAND_CACHE_REFRESH_INTERVAL_MS: ${PRICE_BAND_CACHE_REFRESH_INTERVAL_MS:-86400000}

  molit-daily-collector:
    build: .
    container_name: ${CONTAINER_PREFIX:-orulzip}-molit-daily-collector
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        while true; do
          npm run sync:molit -- --targets ${MOLIT_DAILY_TARGETS:-seoul,gyeonggi,incheon} --limit ${MOLIT_DAILY_LIMIT:-8000} --delay-ms ${MOLIT_DAILY_DELAY_MS:-350};
          sleep ${MOLIT_DAILY_INTERVAL_SECONDS:-86400};
        done
    environment:
      DATABASE_URL: postgres://orulzip:${POSTGRES_PASSWORD:-orulzip_change_me}@postgres:5432/orulzip
      MOLIT_APT_TRADE_SERVICE_KEY: ${MOLIT_APT_TRADE_SERVICE_KEY:-}
      NAVER_MAP_NCP_KEY_ID: ${NAVER_MAP_NCP_KEY_ID:-}
      NAVER_MAP_NCP_KEY_SECRET: ${NAVER_MAP_NCP_KEY_SECRET:-}
      MOLIT_GEOCODE_LIMIT: ${MOLIT_GEOCODE_LIMIT:-5000}
